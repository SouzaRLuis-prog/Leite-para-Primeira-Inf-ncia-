name: Deploy Seguro para GitHub Pages

on:
  push:
    branches:
      - main

# Dá permissões explícitas para o script poder alterar e criar branches
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      # Injeta a URL usando uma estratégia nativa do bash via Node
      - name: Injetar URL Secreta no index.html
        env:
          MINHA_API_URL: ${{ secrets.URL_MINHA_API }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'index.html';
            if (!fs.existsSync(path)) {
              console.error('ERRO CRÍTICO: O arquivo index.html não foi encontrado na raiz!');
              process.exit(1);
            }
            let content = fs.readFileSync(path, 'utf8');
            content = content.split('REPLACE_WITH_API_URL').join(process.env.MINHA_API_URL);
            fs.writeFileSync(path, content, 'utf8');
            console.log('Substituição realizada com sucesso!');
          "

      - name: Enviar para o GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
